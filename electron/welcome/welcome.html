<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Site Wrapper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .welcome {
      max-width: 400px;
    }
    h1 {
      font-size: 28px;
      color: #fff;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .hint {
      color: #4a9eff;
      font-size: 13px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="welcome">
    <h1>AI Site Wrapper</h1>
    <p>Click a bookmark above or press <strong>+</strong> to open a site.</p>
    <p class="hint">Tip: Use the gear icon to manage your sites.</p>
  </div>
</body>
</html>
