<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- AI brain/chip icon -->
  <circle cx="64" cy="52" r="22" fill="none" stroke="#fff" stroke-width="3"/>

  <!-- Brain circuit dots -->
  <circle cx="54" cy="46" r="3" fill="#fff"/>
  <circle cx="74" cy="46" r="3" fill="#fff"/>
  <circle cx="64" cy="56" r="3" fill="#fff"/>
  <circle cx="56" cy="56" r="2.5" fill="#fff"/>
  <circle cx="72" cy="56" r="2.5" fill="#fff"/>

  <!-- Circuit lines from brain -->
  <line x1="54" y1="46" x2="64" y2="56" stroke="#fff" stroke-width="1.5"/>
  <line x1="74" y1="46" x2="64" y2="56" stroke="#fff" stroke-width="1.5"/>
  <line x1="56" y1="56" x2="64" y2="56" stroke="#fff" stroke-width="1.5"/>
  <line x1="72" y1="56" x2="64" y2="56" stroke="#fff" stroke-width="1.5"/>

  <!-- External connection nodes (sites) -->
  <circle cx="36" cy="36" r="4" fill="#fbbf24"/>
  <circle cx="92" cy="36" r="4" fill="#34d399"/>
  <circle cx="36" cy="68" r="4" fill="#f87171"/>
  <circle cx="92" cy="68" r="4" fill="#a78bfa"/>

  <!-- Connection lines to brain -->
  <line x1="40" y1="38" x2="50" y2="44" stroke="#ffffff80" stroke-width="1.5"/>
  <line x1="88" y1="38" x2="78" y2="44" stroke="#ffffff80" stroke-width="1.5"/>
  <line x1="40" y1="66" x2="50" y2="58" stroke="#ffffff80" stroke-width="1.5"/>
  <line x1="88" y1="66" x2="78" y2="58" stroke="#ffffff80" stroke-width="1.5"/>

  <!-- "WRAP" tab bar at bottom -->
  <rect x="20" y="86" width="88" height="24" rx="6" fill="#ffffff20"/>
  <rect x="24" y="90" width="18" height="16" rx="3" fill="#fbbf24"/>
  <rect x="45" y="90" width="18" height="16" rx="3" fill="#34d399"/>
  <rect x="66" y="90" width="18" height="16" rx="3" fill="#f87171"/>
  <rect x="87" y="90" width="18" height="16" rx="3" fill="#a78bfa"/>
</svg>
