<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Site Wrapper - Connection Failed</title>
  <link rel="stylesheet" href="error.css">
</head>
<body>
  <div class="error-box">
    <div class="error-icon">&#128268;</div>
    <h1 id="msg-en">Unable to connect</h1>
    <div class="sub" id="msg-zh"></div>
    <div class="error-url" id="url"></div>
    <div class="actions">
      <button class="btn btn-back" id="back-btn">&larr; Back / 返回</button>
      <button class="btn btn-retry" id="retry-btn">Retry / 重试</button>
    </div>
    <div class="hint">
      <div>Move your mouse to the top to switch to another site.</div>
      <div>将鼠标移到页面顶部，即可切换到其他站点。</div>
    </div>
  </div>
  <script src="../lib/config.js"></script>
  <script src="error.js"></script>
</body>
</html>
